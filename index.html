<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Application Tracker</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@latest/dist/full.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body class="bg-slate-50">

    <section class="container mx-auto p-6">
        <h1 class="text-3xl font-bold mb-6 text-slate-800">Job Application Tracker</h1>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="card bg-white shadow-md">
                <div class="card-body">
                    <h2 class="text-lg font-semibold text-slate-500">Total Jobs</h2>
                    <p id="total-count" class="text-4xl font-bold">8</p>
                </div>
            </div>
            <div class="card bg-white shadow-md">
                <div class="card-body">
                    <h2 class="text-lg font-semibold text-slate-500">Interviewing</h2>
                    <p id="interview-count" class="text-4xl font-bold text-success">0</p>
                </div>
            </div>
            <div class="card bg-white shadow-md">
                <div class="card-body">
                    <h2 class="text-lg font-semibold text-slate-500">Rejected</h2>
                    <p id="rejected-count" class="text-4xl font-bold text-error">0</p>
                </div>
            </div>
        </div>
    </section>

  

    <script src="script.js"></script>
</body>
</html>
